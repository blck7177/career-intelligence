# Agent-supplied source_type alias → canonical (source_type, source_provider).
# Keys are normalized: lower-case, no spaces, hyphens, or underscores.
# Used by search_run worker when persisting agent-discovered job records.
#
# source_type categories: ats | job_board | company_careers | unknown
# Human-owned config — extend for new ATS platforms, boards, or company career sites.

aliases:
  # ATS platforms
  greenhouse:
    source_type: ats
    source_provider: greenhouse
  lever:
    source_type: ats
    source_provider: lever
  workday:
    source_type: ats
    source_provider: workday
  taleo:
    source_type: ats
    source_provider: taleo
