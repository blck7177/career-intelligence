services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: career
      POSTGRES_PASSWORD: career
      POSTGRES_DB: career_openclaw
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career -d career_openclaw"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  openclaw-gateway:
    build:
      context: ../..
      dockerfile: infra/docker/openclaw.Dockerfile
    ports:
      - "127.0.0.1:18790:18789"
    init: true
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../../.env
    environment:
      OPENCLAW_STATE_DIR: /openclaw/state
      # Points to the writable runtime volume. The entrypoint copies the repo
      # source config here on each start so OpenClaw can do atomic saves.
      OPENCLAW_CONFIG_PATH: /openclaw/config/openclaw.json
      OPENCLAW_WORKSPACE_DIR: /openclaw/workspace
      # TOOL_LEDGER_SIGNING_KEY comes from env_file (../../.env).
      # Do NOT override here with ${...} interpolation — shell env may be empty
      # and would silently override the env_file value with blank string.
    volumes:
      - openclaw_state:/openclaw/state
      # Writable runtime config: entrypoint materializes openclaw.json here.
      - openclaw_config:/openclaw/config
      - openclaw_workspace:/openclaw/workspace
      - agent_artifacts:/app/data/agent_artifacts
      # Repo source — read-only. Skills, agents, and wrappers are loaded from here.
      - ../../agent:/app/agent:ro
      - ../../tools/wrappers/agent_tools:/app/tools/wrappers/agent_tools:ro
      # exec-approvals.json is materialized by the entrypoint on every startup
      # (cp from /app/agent/openclaw/config → /openclaw/state). No bind mount needed.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18789/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://career:career@postgres:5432/career_openclaw
      REDIS_URL: redis://redis:6379/0
      DEV_MODE: "1"
      ENV: development
      DEV_AUTH_BYPASS: "${DEV_AUTH_BYPASS:-}"
    volumes:
      - agent_artifacts:/app/data/agent_artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Deterministic short tasks: job_report, fit_report
  # Listens on the "fast" queue. Does NOT need openclaw-gateway.
  worker-fast:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    command: celery -A apps.worker.celery_app worker --loglevel=info --queues=fast --concurrency=2
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://career:career@postgres:5432/career_openclaw
      REDIS_URL: redis://redis:6379/0
      AGENT_ARTIFACTS_DIR: /app/data/agent_artifacts
    volumes:
      - agent_artifacts:/app/data/agent_artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # OpenClaw agent tasks: job_discovery, job_research, run_reflection
  # Listens on the "agent" queue. concurrency=1 to prevent resource contention.
  # Requires openclaw-gateway to be healthy before starting.
  #
  # This worker is a gateway CLIENT only — it does not run openclaw-gateway itself.
  # network_mode: "service:openclaw-gateway" shares the gateway's network namespace
  # so that "openclaw agent ..." connects via localhost:18789 (loopback, no TLS
  # requirement). This is the officially documented Docker pattern for openclaw-cli.
  # The worker retains access to postgres/redis via the gateway's Docker bridge.
  worker-agent:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    command: celery -A apps.worker.celery_app worker --loglevel=info --queues=agent --concurrency=1
    network_mode: "service:openclaw-gateway"
    init: true
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://career:career@postgres:5432/career_openclaw
      REDIS_URL: redis://redis:6379/0
      AGENT_ARTIFACTS_DIR: /app/data/agent_artifacts
      OPENCLAW_BIN: openclaw
      OPENCLAW_STATE_DIR: /openclaw/state
      OPENCLAW_GATEWAY_MODE: "client"
      # Read-only: gives the CLI the agent list so it can route --agent calls
      # to the gateway. The worker does NOT own or write this config.
      OPENCLAW_CONFIG_PATH: /openclaw/config/openclaw.json
      # TOOL_LEDGER_SIGNING_KEY comes from env_file (../../.env). No override here.
    volumes:
      - agent_artifacts:/app/data/agent_artifacts
      - openclaw_state:/openclaw/state
      # Read-only: CLI needs to read agent definitions to route gateway calls.
      - openclaw_config:/openclaw/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      openclaw-gateway:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked in at build time by Next.js.
        # Pass them via build args so the image has the correct Clerk key.
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy

  # Celery Flower — worker/task monitoring dashboard (dev only)
  # Access at http://localhost:5555
  flower:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
      args:
        EXTRA_DEPS: "monitoring"
    command: celery -A apps.worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - ../../.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  openclaw_state:
  openclaw_config:
  openclaw_workspace:
  agent_artifacts:
